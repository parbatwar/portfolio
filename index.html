    <body>
        <div id="initial-loader">
        <div class="dots">
            <span></span><span></span><span></span>
        </div>
        </div>

        <div id="root"></div>

        <script type="module" src="/src/main.jsx"></script>

        <style>
            #initial-loader {
            position: fixed;
            inset: 0;
            background: #050508;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            }

            .dots {
            display: flex;
            gap: 8px;
            }

            .dots span {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
            }

            .dots span:nth-child(2) {
            animation-delay: 0.2s;
            }

            .dots span:nth-child(3) {
            animation-delay: 0.4s;
            }

            @keyframes bounce {
            0%, 80%, 100% {
                transform: scale(0.6);
                opacity: 0.4;
            }
            40% {
                transform: scale(1);
                opacity: 1;
            }
            }
        </style>
    </body>
